name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app && xcodebuild -version

      - name: Resolve packages
        working-directory: vendored/boring.notch
        run: xcodebuild -resolvePackageDependencies -project boringNotch.xcodeproj

      - name: Build
        working-directory: vendored/boring.notch
        run: |
          xcodebuild build \
            -project boringNotch.xcodeproj \
            -scheme boringNotch \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
