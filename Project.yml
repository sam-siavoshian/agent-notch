name: AgentNotch


options:
  bundleIdPrefix: com.agentnotch
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Manual
    OTHER_CODE_SIGN_FLAGS: "--timestamp=none"
    # Hardened runtime OFF for local dev: without it macOS keeps our declared
    # entitlements intact at runtime, so TCC grants bind to a stable effective
    # signature across rebuilds. Turn back on only when shipping notarized.
    ENABLE_HARDENED_RUNTIME: NO

configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

targets:
  AgentNotchMCP:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Helpers/AgentNotchMCP
    settings:
      base:
        PRODUCT_NAME: AgentNotchMCP
        SKIP_INSTALL: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO

  AgentNotch:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    dependencies:
      - target: AgentNotchMCP
        link: false
        embed: false
    postCompileScripts:
      - name: "Embed AgentNotchMCP helper"
        script: |
          set -euo pipefail
          if [ -z "${BUILT_PRODUCTS_DIR:-}" ] || [ -z "${TARGET_BUILD_DIR:-}" ] || [ -z "${EXECUTABLE_FOLDER_PATH:-}" ]; then
            echo "missing build env vars" >&2
            exit 1
          fi
          src="$BUILT_PRODUCTS_DIR/AgentNotchMCP"
          dst="$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH/AgentNotchMCP"
          if [ ! -f "$src" ]; then
            echo "AgentNotchMCP helper not built at $src" >&2
            exit 1
          fi
          /bin/mkdir -p "$(dirname "$dst")"
          /bin/cp -f "$src" "$dst"
          /bin/chmod +x "$dst"
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/AgentNotchMCP
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/AgentNotchMCP
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "AgentNotch.entitlements"
          # Finder-style "Foo 2.swift" / "Foo 3.swift" duplicates left over
          # from cherry-pick merges redefine the same types as Foo.swift and
          # ambiguate every cross-file reference. Exclude across all source
          # roots so xcodegen never picks them up.
          - "**/* [0-9].swift"
      - path: Core
        excludes:
          - "**/* [0-9].swift"
      - path: Features
        excludes:
          - "**/* [0-9].swift"
      - path: .env
        buildPhase: resources
        optional: true
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026 Agent in the Notch team."
        NSMicrophoneUsageDescription: "Agent in the Notch listens to your voice when you long-press the cursor companion."
        NSAppleEventsUsageDescription: "Agent in the Notch sends events to other apps when performing computer-use actions."
        NSScreenCaptureDescription: "Agent in the Notch captures screenshots on click events to build short context summaries for the agent."
        NSCalendarsFullAccessUsageDescription: "Agent in the Notch reads your calendar to show upcoming events in the notch."
    entitlements:
      path: App/AgentNotch.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
        # apple-events removed: CGEvent path drives clicks/keys directly.
        # Restricted entitlement would need a provisioning profile to actually
        # apply at runtime; without one it gets stripped, which destabilizes
        # the effective signature TCC keys grants against.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentnotch.app
        PRODUCT_NAME: AgentNotch
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
