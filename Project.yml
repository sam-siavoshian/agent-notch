name: AgentNotch


options:
  bundleIdPrefix: com.agentnotch
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Manual
    OTHER_CODE_SIGN_FLAGS: "--timestamp=none"
    # Hardened runtime OFF for local dev: without it macOS keeps our declared
    # entitlements intact at runtime, so TCC grants bind to a stable effective
    # signature across rebuilds. Turn back on only when shipping notarized.
    ENABLE_HARDENED_RUNTIME: NO

configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

targets:
  AgentNotch:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "AgentNotch.entitlements"
      - path: Core
      - path: Features
      - path: .env
        buildPhase: resources
        optional: true
      - path: Config
        type: folder
        buildPhase: resources
        optional: true
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026 Agent in the Notch team."
        NSMicrophoneUsageDescription: "Agent in the Notch listens to your voice when you long-press the cursor companion."
        NSAppleEventsUsageDescription: "Agent in the Notch sends events to other apps when performing computer-use actions."
        NSScreenCaptureDescription: "Agent in the Notch captures screenshots on click events to build short context summaries for the agent."
        NSCalendarsFullAccessUsageDescription: "Agent in the Notch reads your calendar to show upcoming events in the notch."
    entitlements:
      path: App/AgentNotch.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
        # apple-events removed: CGEvent path drives clicks/keys directly.
        # Restricted entitlement would need a provisioning profile to actually
        # apply at runtime; without one it gets stripped, which destabilizes
        # the effective signature TCC keys grants against.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentnotch.app
        PRODUCT_NAME: AgentNotch
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
